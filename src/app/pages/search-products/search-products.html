<div class="container mt-5">
  <div class="row mb-4">
    <div class="col-12">
      <h2>Search Products</h2>
      <div class="card p-3 shadow-sm">
        <div class="row g-3">
          <div class="col-md-4">
            <label class="form-label">Search by Title</label>
            <input type="text" class="form-control" [(ngModel)]="searchQuery" placeholder="Enter product name...">
          </div>
          <div class="col-md-2">
            <label class="form-label">Min Price</label>
            <input type="number" class="form-control" [(ngModel)]="minPrice" placeholder="0">
          </div>
          <div class="col-md-2">
            <label class="form-label">Max Price</label>
            <input type="number" class="form-control" [(ngModel)]="maxPrice" placeholder="1000">
          </div>
          <div class="col-md-2">
            <label class="form-label">Category</label>
            <select class="form-select" [(ngModel)]="selectedCategoryId">
              <option [ngValue]="null">All Categories</option>
              <option *ngFor="let cat of categories" [ngValue]="cat.id">{{ cat.name }}</option>
            </select>
          </div>
          <div class="col-md-2 d-flex align-items-end">
            <button class="btn btn-primary w-100" (click)="onSearch()" [disabled]="isLoading">
              <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-1"></span>
              Search
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="row">
    <div class="col-lg-4 col-md-6 mb-4" *ngFor="let product of results">
      <div class="card h-100 shadow-sm">
        <img [src]="product.images[0]" class="card-img-top" style="height:200px; object-fit:cover;">
        <div class="card-body">
          <h5 class="card-title text-truncate">{{ product.title }}</h5>
          <p class="text-muted small mb-1">{{ product.category.name }}</p>
          <p class="fw-bold mb-3">{{ product.price | currency:'USD' }}</p>
          <button class="btn btn-outline-dark w-100" [routerLink]="['/vehicle', product.id]">View Details</button>
        </div>
      </div>
    </div>
    
    <div class="col-12 text-center py-5" *ngIf="results.length === 0 && !isLoading">
      <p class="text-muted">No products found matching your search.</p>
    </div>
  </div>
</div>
