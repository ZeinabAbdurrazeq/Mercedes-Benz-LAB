<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-5 p-4 shadow-sm bg-white rounded">
      <h2 class="text-center mb-4">Login</h2>

      <form [formGroup]="loginForm" (ngSubmit)="onLogin()">
        <div class="mb-3">
          <label class="form-label">Email address</label>
          <input
            type="email"
            formControlName="email"
            class="form-control"
            [ngClass]="
              loginForm.get('email')?.touched
                ? loginForm.get('email')?.valid
                  ? 'is-valid'
                  : 'is-invalid'
                : ''
            "
          />
          <div class="valid-feedback">Valid email!</div>
          <div class="invalid-feedback">
            <span *ngIf="loginForm.get('email')?.errors?.['required']">Email is required.</span>
            <span *ngIf="loginForm.get('email')?.errors?.['email']"
              >Enter a valid email format.</span
            >
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Password</label>
          <input
            type="password"
            formControlName="password"
            class="form-control"
            [ngClass]="
              loginForm.get('password')?.touched
                ? loginForm.get('password')?.valid
                  ? 'is-valid'
                  : 'is-invalid'
                : ''
            "
          />
          <div class="valid-feedback">Looks good!</div>
          <div class="invalid-feedback">
            <span *ngIf="loginForm.get('password')?.errors?.['required']"
              >Password is required.</span
            >
            <span *ngIf="loginForm.get('password')?.errors?.['minlength']"
              >Password must be at least 6 chars.</span
            >
          </div>
        </div>

        <div *ngIf="errorMsg" class="alert alert-danger py-2">{{ errorMsg }}</div>

        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-dark w-100" [disabled]="isLoading">
            <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-1"></span>
            Login
          </button>
          <button type="button" (click)="onReset()" class="btn btn-outline-secondary w-100">
            Reset
          </button>
        </div>
      </form>

    </div>
  </div>
</div>
